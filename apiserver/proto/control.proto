syntax = "proto3";

package drop;

option go_package = "mini-drop/apiserver/proto";

import "common.proto";
import "healthcheck.proto";

// apiserver → Server 控制平面
service Control {
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc FetchData(FetchDataRequest) returns (FetchDataResponse);
  rpc StatAgent(StatAgentRequest) returns (StatAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc StartContinuous(StartContinuousRequest) returns (StartContinuousResponse);
  rpc StopContinuous(StopContinuousRequest) returns (StopContinuousResponse);
  rpc ListWindows(ListWindowsRequest) returns (ListWindowsResponse);
}

message CreateTaskRequest {
  string target_ip = 1;
  string service = 2;
  TaskDesc task_desc = 3;
}

message CreateTaskResponse {
  int32 code = 1;
  string message = 2;
}

message FetchDataRequest {
  string task_id = 1;
}

message FetchDataResponse {
  int32 code = 1;
  string message = 2;
  File file = 3;
  string cos_key = 4;
}

message StatAgentRequest {
  string ip_addr = 1;
}

message StatAgentResponse {
  int32 code = 1;
  string message = 2;
  PidStats self_pstats = 3;
  PidStats children_pstats = 4;
}

message ListAgentsRequest {
}

message AgentInfo {
  string host_name = 1;
  string ip_addr = 2;
  string agent_version = 3;
  bool online = 4;
  PidStats self_pstats = 5;
  PidStats children_pstats = 6;
  string uid = 7;
}

message ListAgentsResponse {
  int32 code = 1;
  string message = 2;
  repeated AgentInfo agents = 3;
}

message StartContinuousRequest {
  string target_ip = 1;
  int32 pid = 2;
  uint32 hz = 3;
  uint32 window_sec = 4;
  uint32 profiler_type = 5;
  string callgraph = 6;
  string event = 7;
  string name = 8;
}

message StartContinuousResponse {
  int32 code = 1;
  string message = 2;
  string task_id = 3;
}

message StopContinuousRequest {
  string task_id = 1;
}

message StopContinuousResponse {
  int32 code = 1;
  string message = 2;
}

message ListWindowsRequest {
  string task_id = 1;
}

message ContinuousWindowInfo {
  string window_tid = 1;
  int32 seq = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  int32 status = 5;
  string cos_key = 6;
}

message ListWindowsResponse {
  int32 code = 1;
  string message = 2;
  repeated ContinuousWindowInfo windows = 3;
}
