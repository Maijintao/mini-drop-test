syntax = "proto3";

package drop;

option go_package = "mini-drop/apiserver/proto";

import "common.proto";
import "google/protobuf/empty.proto";

// Server → Agent 任务下发服务
service Hotmethod {
  rpc NotifyResult(TaskResult) returns (google.protobuf.Empty);
  rpc UpdateTaskStatus(TaskStatusUpdate) returns (google.protobuf.Empty);
}

// 任务状态枚举
enum TaskState {
  TASK_PENDING = 0;
  TASK_DISPATCHED = 1;
  TASK_RUNNING = 2;
  TASK_UPLOADING = 3;
  TASK_DONE = 4;
  TASK_FAILED = 5;
  TASK_TIMEOUT = 6;
}

message TaskResult {
  string task_id = 1;
  string error_message = 2;
  File file = 3;
  string cos_key = 4;
  repeated PidStats self_pstats = 5;
  repeated PidStats children_pstats = 6;
}

message TaskStatusUpdate {
  string task_id = 1;
  TaskState status = 2;
  string reason = 3;
}
