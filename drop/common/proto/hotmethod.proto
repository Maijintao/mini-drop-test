syntax = "proto3";

package drop;

option go_package = "mini-drop/proto";

import "common.proto";
import "healthcheck.proto";
import "google/protobuf/empty.proto";

// Server → Agent 任务下发服务
service Hotmethod {
  rpc Collect(CollectRequest) returns (CollectResponse);
  rpc NotifyResult(TaskResult) returns (google.protobuf.Empty);
  rpc UpdateTaskStatus(TaskStatusUpdate) returns (google.protobuf.Empty);
}

message CollectRequest {
  string target_ip = 1;
  TaskDesc task_desc = 2;
  uint32 timeout_sec = 3;  // 同步等待超时，0 表示仅入队不等待
}

message CollectResponse {
  int32 code = 1;           // 0=成功, -1=超时, -2=执行失败
  string message = 2;
  TaskResult result = 3;    // code=0 时填充
}

// 任务状态枚举
enum TaskState {
  TASK_PENDING = 0;
  TASK_DISPATCHED = 1;
  TASK_RUNNING = 2;
  TASK_UPLOADING = 3;
  TASK_DONE = 4;
  TASK_FAILED = 5;
  TASK_TIMEOUT = 6;
}

message TaskResult {
  string task_id = 1;
  string error_message = 2;
  File file = 3;
  string cos_key = 4;
  repeated PidStats self_pstats = 5;
  repeated PidStats children_pstats = 6;
}

message TaskStatusUpdate {
  string task_id = 1;
  TaskState status = 2;
  string reason = 3;
}
