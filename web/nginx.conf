server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 反向代理 apiserver
    location /api/ {
        proxy_pass http://apiserver:8191;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Drop_user_uid $http_drop_user_uid;
        proxy_set_header Drop_user_name $http_drop_user_name;
        proxy_set_header Drop_user_token $http_drop_user_token;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
