version: '3.8'

services:
  # PostgreSQL - 数据库
  postgres:
    image: postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO - 对象存储
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Drop Server - 任务调度服务
  drop-server:
    build:
      context: ./drop
      dockerfile: Dockerfile
    container_name: drop-server
    ports:
      - "50051:50051"
    volumes:
      - ./drop/etc:/etc/drop
      - drop-db:/data
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drop-data
      TASK_DB_PATH: /data/task_states.db
    command: ["--port", "50051"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50051'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Drop Agent - 性能采集代理
  drop-agent:
    build:
      context: ./drop
      dockerfile: Dockerfile
    container_name: drop-agent
    depends_on:
      drop-server:
        condition: service_healthy
    volumes:
      - ./drop/etc:/etc/drop
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    privileged: true
    pid: host
    network_mode: host
    entrypoint: ["drop_agent"]
    command: ["--config", "/etc/drop/config.json"]
    restart: unless-stopped

  # APIServer - Go 后端编排层
  apiserver:
    build:
      context: ./apiserver
      dockerfile: Dockerfile
    container_name: apiserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      drop-server:
        condition: service_healthy
    ports:
      - "8191:8191"
    volumes:
      - ./apiserver/config:/etc/apiserver
      - ./analysis:/app/analysis:ro
    environment:
      GIN_MODE: debug
    command: ["./apiserver", "-c", "/etc/apiserver/apiserver.yaml"]
    restart: unless-stopped

  # Analysis - Python 分析引擎（按需启动）
  analysis-runner:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    container_name: analysis-runner
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./analysis/config.ini.example:/app/analysis/config.ini:ro
    entrypoint: ["python3", "hotmethod_analyzer.py"]
    command: ["--config", "/app/analysis/config.ini"]
    profiles:
      - analysis

  # Web Frontend - React 可视化
  web-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web-frontend
    depends_on:
      apiserver:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  minio-data:
  pg-data:
  drop-db:
