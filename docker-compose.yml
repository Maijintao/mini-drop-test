version: '3.8'

services:
  # Drop Server - 任务调度服务
  drop-server:
    build:
      context: ./drop
      dockerfile: Dockerfile
    container_name: drop-server
    ports:
      - "50051:50051"
    volumes:
      - ./drop/etc:/etc/drop
    command: ["drop_server", "--port", "50051"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Drop Agent - 性能采集代理（可多实例）
  drop-agent:
    build:
      context: ./drop
      dockerfile: Dockerfile
    container_name: drop-agent
    depends_on:
      - drop-server
    volumes:
      - ./drop/etc:/etc/drop
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    privileged: true  # perf/bpftrace 需要
    command: ["drop_agent"]
    restart: unless-stopped
    environment:
      - SERVER_ADDR=drop-server:50051

  # MinIO - 对象存储
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # PostgreSQL - 数据库
  postgres:
    image: postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  # APIServer - Go 后端编排层
  apiserver:
    build:
      context: ./apiserver
      dockerfile: Dockerfile
    container_name: apiserver
    depends_on:
      - postgres
      - minio
      - drop-server
    ports:
      - "8191:8191"
    volumes:
      - ./apiserver/config:/etc/apiserver
    command: ["./apiserver", "-c", "/etc/apiserver/apiserver.yaml"]
    restart: unless-stopped

  # Analysis - Python 分析引擎（一次性 Job，apiserver 用 docker exec 触发）
  analysis-runner:
    build:
      context: ./analysis
      dockerfile: Dockerfile
    container_name: analysis-runner
    depends_on:
      - minio
      - postgres
    volumes:
      - ./analysis:/app/analysis
    entrypoint: ["python3", "hotmethod_analyzer.py"]
    # 不设 command，由 apiserver 通过 docker exec 传参触发
    profiles:
      - analysis

volumes:
  minio-data:
  pg-data:
