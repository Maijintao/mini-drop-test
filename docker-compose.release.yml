services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:14}
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: drop
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  drop-server:
    image: ${DROP_IMAGE:-maijintao/mini-drop-drop:latest}
    container_name: drop-server
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "50051:50051"
    volumes:
      - ./drop/etc:/etc/drop
      - drop-db:/data
    environment:
      MINIO_ENDPOINT: minio:9000
      AGENT_MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drop-data
      TASK_DB_PATH: /data/task_states.db
    command: ["--port", "50051"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/50051'"]
      interval: 10s
      timeout: 5s
      retries: 3

  drop-agent:
    image: ${DROP_IMAGE:-maijintao/mini-drop-drop:latest}
    container_name: drop-agent
    depends_on:
      drop-server:
        condition: service_healthy
    volumes:
      - ./drop/etc:/etc/drop
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/kernel/tracing:/sys/kernel/tracing:rw
    privileged: true
    pid: host
    network_mode: host
    entrypoint: ["drop_agent"]
    command: ["--config", "/etc/drop/config.json"]
    restart: unless-stopped

  apiserver:
    image: ${APISERVER_IMAGE:-maijintao/mini-drop-apiserver:latest}
    container_name: apiserver
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      drop-server:
        condition: service_healthy
    ports:
      - "8191:8191"
    volumes:
      - ./apiserver/config:/etc/apiserver
    environment:
      GIN_MODE: debug
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drop-data
      MINIO_SECURE: "false"
    entrypoint: ["./apiserver"]
    command: ["-c", "/etc/apiserver/apiserver.yaml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8191/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  web-frontend:
    image: ${WEB_IMAGE:-maijintao/mini-drop-web:latest}
    container_name: web-frontend
    depends_on:
      apiserver:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

  analysis-runner:
    image: ${ANALYSIS_IMAGE:-maijintao/mini-drop-analysis:latest}
    container_name: analysis-runner
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: drop-data
      MINIO_SECURE: "false"
      APISERVER_URL: http://apiserver:8191
    profiles:
      - analysis

volumes:
  minio-data:
  pg-data:
  drop-db:
